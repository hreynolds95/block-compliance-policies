name: Validate Document Metadata

on:
  pull_request:
    paths:
      - 'docs/**/*.md'

jobs:
  validate-metadata:
    name: validate-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate frontmatter on changed documents
        run: |
          # Get list of changed .md files in docs/
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'docs/**/*.md' || true)
          if [ -z "$CHANGED" ]; then
            echo "No document files changed."
            exit 0
          fi
          python scripts/validate_metadata.py $CHANGED
