name: Retention and Review Check

on:
  # Schedule disabled — prototype mode, re-enable once data integrity is confirmed
  # Runs every Monday at 11:15 AM ET (15:15 UTC), 15 min after Snowflake data refresh
  # schedule:
  #   - cron: '15 15 * * 1'
  workflow_dispatch:

jobs:
  retention-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml python-dateutil

      - name: Run retention and review check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/retention_check.py docs/ --open-issues
